version: '3.8'

services:
  db:
    image: postgres:15
    container_name: auth_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_password
      POSTGRES_DB: schedule
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: fastapi_app
    ports:
      - "8000:8000"
    environment:
      # Внутри Docker-сети вместо localhost используем имя сервиса 'db'
      DATABASE_URL: postgresql://postgres:your_password@db:5432/schedule
      SECRET_KEY: some_very_secret_key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    depends_on:
      - db

volumes:
  postgres_data: